name: Validate Branch and Commit Standards

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  validate:
    name: Validate Branch and Commit Standards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          fi

          echo "Branch name: $BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Skip validation for protected branches
        run: |
          if [[ "$BRANCH_NAME" == "master" || "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "development" ]]; then
            echo "Branch $BRANCH_NAME is exempt from validation."
            echo "SKIP_VALIDATION=true" >> $GITHUB_ENV
          fi

      - name: Validate branch name
        if: env.SKIP_VALIDATION != 'true'
        run: |
          PATTERN="^(feature|bugfix|documentation|rc)/KWN-[0-9]{4,5}-[a-z0-9]+(-[a-z0-9]+)*$"

          echo "Validating branch: $BRANCH_NAME"

          if [[ ! "$BRANCH_NAME" =~ $PATTERN ]]; then
            echo "❌ Invalid branch name: $BRANCH_NAME"
            echo "Expected pattern: feature/KWN-1234-description"
            exit 1
          fi

          echo "✅ Branch name is valid"

      - name: Collect commits
        if: env.SKIP_VALIDATION != 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Fetching commits for PR..."
            git fetch origin ${{ github.base_ref }}
            COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:"%s")
          else
            echo "Fetching commits for push..."
            COMMITS=$(git log ${{ github.event.before }}..HEAD --pretty=format:"%s")
          fi

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Validate commit messages
        if: env.SKIP_VALIDATION != 'true'
        run: |
          PATTERN="^KWN-[0-9]{3,5}: .+$"

          echo "$COMMITS" | while read COMMIT
          do
            echo "Checking commit: $COMMIT"

            if [[ "$COMMIT" =~ ^Merge ]]; then
              echo "Skipping merge commit"
              continue
            fi

            if [[ "$COMMIT" =~ ^Revert ]]; then
              echo "Skipping revert commit"
              continue
            fi

            if [[ ! "$COMMIT" =~ $PATTERN ]]; then
              echo "❌ Invalid commit message:"
              echo "$COMMIT"
              echo "Expected format: KWN-1234: Commit description"
              exit 1
            fi
          done

          echo "✅ All commit messages follow the standard"